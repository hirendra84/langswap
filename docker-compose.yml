version: '3'

services:
  backend:
    build: .
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
    container_name: ds-backend
    environment:
      - POSTGRES_DB=api
      - POSTGRES_USER=api
      - POSTGRES_PASSWORD=api
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DEBUG=True
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ds-api.rule=Host(`api.backend.langswap.app`)"
      - "traefik.http.routers.ds-api.entrypoints=websecure"
      - "traefik.http.routers.ds-api.tls.certResolver=le"
      - "traefik.docker.network=traefik"
    networks:
      - ds-dev
      - traefik

  celery:
    build: .
    command: echo ''
    container_name: ds-celery
    environment:
      - POSTGRES_DB=api
      - POSTGRES_USER=api
      - POSTGRES_PASSWORD=api
      - POSTGRES_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - BACKEND_URL=http://52.29.181.25:8000
      - DEBUG=True
    depends_on:
      - db
      - redis
    networks:
      - ds-dev

  db:
    image: postgres
    container_name: ds-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=api
      - POSTGRES_USER=api
      - POSTGRES_PASSWORD=api
    networks:
      - ds-dev

  redis:
    image: redis:alpine
    container_name: ds-redis
    ports:
      - '6379:6379'
    networks:
      - ds-dev

volumes:
  postgres_data:

networks:
  ds-dev:
    external: true
  traefik:
    external: true
